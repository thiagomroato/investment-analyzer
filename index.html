<!DOCTYPE html>
<html>
<head>
    <title>Investment Analyzer</title>
</head>
<body>

<h1>📊 Investment Analyzer</h1>

<form method="POST">

    <label>Escolha a ação:</label><br>
    <select name="asset">
        {% for asset in assets %}
            <option value="{{ asset[0] }}">
                {{ asset[1] }} ({{ asset[2] }})
            </option>
        {% endfor %}
    </select><br><br>

    <input name="pl" placeholder="P/L"><br>
    <input name="roe" placeholder="ROE (%)"><br>
    <input name="dy" placeholder="Dividend Yield (%)"><br>
    <input name="debt" placeholder="Dívida/Patrimônio"><br>
    <input name="growth" placeholder="Crescimento (%)"><br><br>

    <button type="submit">Analisar</button>

</form>

{% if decision %}
    <h2>📢 Decisão: {{ decision }}</h2>
{% endif %}

</body>
</html>
